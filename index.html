<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Perfumery Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0F;color:#C4C0D4;font-family:sans-serif;min-height:100vh}
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
#lab{display:none;padding:80px 20px 40px;max-width:900px;margin:0 auto}
.btn{background:#C8A96E;color:#0A0A0F;border:none;padding:16px 40px;font-size:1rem;cursor:pointer;margin:8px}
h1{font-size:3rem;color:#F0EDF8;margin-bottom:12px}
p{color:#6E6A82;margin-bottom:28px}
nav{position:fixed;top:0;left:0;right:0;height:50px;background:#12121A;border-bottom:1px solid #2A2A3E;display:flex;align-items:center;padding:0 20px;z-index:100}
.nb{background:none;border:none;color:#6E6A82;font-size:0.8rem;padding:6px 14px;cursor:pointer;margin-right:4px}
.nb.on{color:#C8A96E}
</style>
</head>
<body>

<nav id="topnav" style="display:none">
  <button class="nb on" onclick="showSec(0)">Visualise</button>
  <button class="nb" onclick="showSec(1)">Database</button>
  <button class="nb" onclick="showSec(2)">Formula</button>
</nav>

<div id="hero">
  <div>
    <h1>RK Perfumery Lab</h1>
    <p>Fine Fragrance Formulation</p>
    <button class="btn" onclick="enterLab()">Enter the Lab</button>
  </div>
</div>

<div id="lab">
  <h2 style="color:#C8A96E;margin-bottom:20px">Welcome to the Lab</h2>
  <div id="s0"><p>Visualise section</p></div>
  <div id="s1" style="display:none"><p>Database section</p></div>
  <div id="s2" style="display:none"><p>Formula section</p></div>
</div>

<script>
function enterLab(){
  document.getElementById("hero").style.display = "none";
  document.getElementById("lab").style.display = "block";
  document.getElementById("topnav").style.display = "flex";
}
function showSec(n){
  for(var i=0;i<3;i++){
    document.getElementById("s"+i).style.display = i==n?"block":"none";
  }
}
</script>
</body>
</html>
